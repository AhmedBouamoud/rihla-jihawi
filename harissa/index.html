<!DOCTYPE html>
<html lang="ar-MA" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>الحراسة العامة — نماذج التقارير</title>
<meta name="description" content="تطبيق نماذج تقارير مرنة للحراسة العامة: غياب، تأخر، سلوك، حوادث، مجالس، امتحانات، مراسلات — قابلة للتخصيص والطباعة.">
<meta name="theme-color" content="#16324f">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#16324f; --navy-2:#1f4b73; --navy-3:#0e2138;
    --gold:#b4820c; --gold-l:#f4e2b3;
    --bg:#eef1f5; --card:#ffffff; --line:#d9e0e8;
    --ink:#1c2a3a; --muted:#5c6b7c;
    --danger:#b3261e; --danger-l:#fbe9e7;
    --success:#166534; --success-l:#e7f5ec;
    --radius:14px;
    --shadow:0 2px 10px rgba(20,40,70,.08), 0 1px 2px rgba(20,40,70,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Cairo","Tajawal","Segoe UI",Tahoma,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .hidden{display:none !important}
  .wrap{max-width:1080px;margin:0 auto;padding:16px 16px 60px}

  /* ===== Header ===== */
  header.app-header{
    background:linear-gradient(135deg,var(--navy-3),var(--navy));
    color:#fff; padding:18px 16px; box-shadow:var(--shadow);
    position:sticky; top:0; z-index:20;
  }
  .app-header .inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .app-header .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:220px}
  .app-header .brand .emoji{font-size:2rem;line-height:1}
  .app-header h1{font-size:1.15rem;margin:0;font-weight:800}
  .app-header .sub{font-size:.78rem;color:#cfe0f0;margin-top:2px}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap}
  .icon-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); color:#fff;
    border-radius:10px; padding:8px 12px; font-size:.85rem; display:flex; align-items:center; gap:6px;
    transition:.15s;
  }
  .icon-btn:hover{background:rgba(255,255,255,.22)}
  .icon-btn.lang-btn{background:rgba(180,130,12,.35);border-color:rgba(244,226,179,.5);font-weight:800}

  .letterhead-bar{
    background:#fff; border-bottom:1px solid var(--line); padding:10px 16px; font-size:.82rem; color:var(--muted);
  }
  .letterhead-bar .inner{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .letterhead-bar b{color:var(--ink)}

  /* ===== Views ===== */
  .view{padding-top:18px}
  .view-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .view-title h2{margin:0;font-size:1.3rem}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}

  .btn{
    border:none;border-radius:10px;padding:9px 16px;font-size:.88rem;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;transition:.15s; white-space:nowrap;
  }
  .btn-primary{background:var(--navy);color:#fff}
  .btn-primary:hover{background:var(--navy-2)}
  .btn-gold{background:var(--gold);color:#3a2a00}
  .btn-gold:hover{filter:brightness(1.06)}
  .btn-light{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-light:hover{background:#f4f7fa}
  .btn-danger{background:var(--danger-l);color:var(--danger)}
  .btn-danger:hover{background:#f7d9d6}
  .btn-sm{padding:6px 11px;font-size:.78rem;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .search-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .search-row input[type=text], .search-row select{
    padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:.9rem;
  }
  .search-row input[type=text]{flex:1;min-width:200px}

  .cat-block{margin-bottom:26px}
  .cat-block h3{
    display:flex;align-items:center;gap:8px;font-size:1.02rem;color:var(--navy-2);
    border-bottom:2px solid var(--line); padding-bottom:8px;margin-bottom:12px;
  }
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .tpl-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px;
  }
  .tpl-card .top{display:flex;align-items:center;gap:8px}
  .tpl-card .top .emoji{font-size:1.5rem}
  .tpl-card .name{font-weight:800;font-size:.98rem;flex:1}
  .tpl-card .meta{font-size:.76rem;color:var(--muted)}
  .tpl-card .badge-custom{
    font-size:.68rem; background:var(--gold-l); color:#7a5a00; padding:2px 7px; border-radius:6px; font-weight:700;
  }
  .tpl-card .actions{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}

  .empty{
    text-align:center;color:var(--muted); padding:40px 10px; background:#fff; border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  /* ===== Fill view ===== */
  .fill-layout{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media (max-width:860px){.fill-layout{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .panel h3{margin:0 0 12px;font-size:1rem;color:var(--navy-2)}
  .field-group{margin-bottom:14px}
  .field-group label{display:block;font-size:.85rem;font-weight:700;margin-bottom:5px;color:var(--ink)}
  .field-group .req{color:var(--danger)}
  .field-group input[type=text],.field-group input[type=number],.field-group input[type=date],
  .field-group input[type=time],.field-group textarea,.field-group select{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:.9rem;background:#fbfcfd;
  }
  .field-group textarea{min-height:70px;resize:vertical}
  .field-group.checkbox-row{display:flex;align-items:center;gap:8px}
  .field-group.checkbox-row label{margin:0}

  .dyn-table{width:100%;border-collapse:collapse;margin-top:6px}
  .dyn-table th,.dyn-table td{border:1px solid var(--line);padding:5px;font-size:.82rem}
  .dyn-table th{background:#f2f5f8}
  .dyn-table td input{width:100%;border:none;background:transparent;padding:4px;font-size:.82rem}
  .dyn-table td input:focus{outline:1px solid var(--navy-2);border-radius:4px}
  .dyn-table .rm-row-btn{background:var(--danger-l);color:var(--danger);border:none;border-radius:6px;padding:3px 8px;font-size:.75rem}

  .extra-field-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap}
  .extra-field-row .grow{flex:1;min-width:120px}
  .extra-field-row .rm{background:var(--danger-l);color:var(--danger);border:none;border-radius:8px;padding:8px 10px}

  /* Print preview */
  #printArea{background:#fff}
  .doc{background:#fff;padding:22px;border:1px solid var(--line);border-radius:10px;min-height:400px}
  .doc-head{text-align:center;margin-bottom:14px;border-bottom:2px solid var(--navy);padding-bottom:10px}
  .doc-head .kingdom{font-weight:800;font-size:.95rem}
  .doc-head .line{font-size:.82rem;color:var(--muted)}
  .doc-head .inst{font-weight:800;font-size:1.02rem;margin-top:4px;color:var(--navy)}
  .doc-title{
    text-align:center;font-weight:900;font-size:1.15rem;background:var(--gold-l);color:#5b4300;
    padding:8px;border-radius:8px;margin:14px 0;
  }
  .doc-meta{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;gap:6px}
  .doc-row{margin-bottom:10px;font-size:.9rem}
  .doc-row .lbl{font-weight:800;color:var(--navy-2)}
  .doc-row .val{margin-top:2px;white-space:pre-wrap}
  table.doc-table{width:100%;border-collapse:collapse;margin:8px 0 14px}
  table.doc-table th,table.doc-table td{border:1px solid #94a3b8;padding:6px;font-size:.82rem;text-align:center}
  table.doc-table th{background:#eef1f5}
  .doc-sign{display:flex;justify-content:space-between;margin-top:36px;gap:20px;flex-wrap:wrap}
  .doc-sign .box{text-align:center;flex:1;min-width:150px}
  .doc-sign .box .cap{font-weight:800;font-size:.85rem;margin-bottom:34px}
  .doc-sign .box .line-blank{border-top:1px solid var(--ink);width:80%;margin:0 auto}

  /* Builder */
  .field-editor{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:#fbfcfd}
  .field-editor .row1{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .field-editor .row1 input[type=text]{flex:2;min-width:140px;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
  .field-editor .row1 select{flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
  .field-editor .row2{margin-top:8px}
  .field-editor .row2 textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;min-height:50px}
  .field-editor .row3{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .field-editor .req-check{display:flex;align-items:center;gap:5px;font-size:.8rem}
  .move-btns{display:flex;gap:4px}
  .move-btns button{background:#fff;border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:.8rem}

  /* Log */
  .log-table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  table.log-table{width:100%;border-collapse:collapse;min-width:640px}
  table.log-table th,table.log-table td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--line);text-align:start}
  table.log-table th{background:#f2f5f8;color:var(--navy-2)}
  table.log-table tr:hover td{background:#f9fbfd}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,25,40,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal{background:#fff;border-radius:var(--radius);padding:20px;max-width:480px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .modal h3{margin-top:0}
  .modal .field-group{margin-bottom:12px}
  .modal .field-group label{display:block;font-size:.85rem;font-weight:700;margin-bottom:5px}
  .modal .field-group input{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--navy-3);color:#fff;padding:10px 20px;border-radius:10px;font-size:.85rem;
    box-shadow:var(--shadow); z-index:200; opacity:0; pointer-events:none; transition:opacity .25s;
  }
  .toast.show{opacity:1}

  footer.app-footer{text-align:center;color:var(--muted);font-size:.78rem;padding:20px;}

  @media print{
    header.app-header,.letterhead-bar,.no-print,footer.app-footer{display:none !important}
    body{background:#fff}
    .wrap{padding:0;max-width:100%}
    #view-fill .fill-layout{display:block}
    #formPanel{display:none !important}
    .doc{border:none;padding:0}
  }
</style>
</head>
<body>

<header class="app-header no-print">
  <div class="inner">
    <div class="brand">
      <span class="emoji">🛡️</span>
      <div>
        <h1 id="appTitleEl">الحراسة العامة</h1>
        <div class="sub" id="appSubtitleEl">نماذج تقارير مرنة — قابلة للتخصيص والطباعة</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnHome">🏠 <span id="lblHome"></span></button>
      <button class="icon-btn" id="btnLog">🗂️ <span id="lblLog"></span></button>
      <button class="icon-btn" id="btnNewTpl">➕ <span id="lblNewTpl"></span></button>
      <button class="icon-btn" id="btnSettings">⚙️ <span id="lblSettings"></span></button>
      <button class="icon-btn lang-btn" id="btnLangToggle">🌐 <span id="lblLangToggle"></span></button>
    </div>
  </div>
</header>

<div class="letterhead-bar no-print">
  <div class="inner">
    <span><b id="lhInst">—</b> · <span id="lhNiaba">—</span> · <span id="lhAcad">—</span></span>
    <span><span id="lhYearLabel"></span> <b id="lhYear">—</b></span>
  </div>
</div>

<div class="wrap">

  <!-- ============ HOME VIEW ============ -->
  <section class="view" id="view-home">
    <div class="view-title">
      <h2 id="homeTitleEl">نماذج التقارير</h2>
    </div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="">
      <select id="categoryFilter"><option value="">كل الفئات</option></select>
    </div>
    <div id="templatesContainer"></div>
  </section>

  <!-- ============ FILL VIEW ============ -->
  <section class="view hidden" id="view-fill">
    <div class="view-title">
      <h2 id="fillTitle">تعبئة نموذج</h2>
      <div class="toolbar no-print">
        <button class="btn btn-light" id="btnBackFromFill"><span id="lblBackFill"></span></button>
        <button class="btn btn-light" id="btnClearForm">🧹 <span id="lblClearForm"></span></button>
        <button class="btn btn-primary" id="btnSaveReport">💾 <span id="lblSaveReport"></span></button>
        <button class="btn btn-gold" id="btnPrintReport">🖨️ <span id="lblPrintReport"></span></button>
      </div>
    </div>
    <div class="fill-layout">
      <div class="panel no-print" id="formPanel">
        <h3>📝 <span id="formPanelTitleEl"></span></h3>
        <div id="formFields"></div>
        <div id="extraFieldsWrap">
          <h3 style="margin-top:18px">➕ <span id="extraFieldsTitleEl"></span></h3>
          <div id="extraFieldsList"></div>
          <button class="btn btn-light btn-sm" id="btnAddExtraField">➕ <span id="lblAddExtraField"></span></button>
        </div>
      </div>
      <div class="panel" id="printArea">
        <h3 class="no-print">🖨️ <span id="printAreaTitleEl"></span></h3>
        <div class="doc" id="docPreview"></div>
      </div>
    </div>
  </section>

  <!-- ============ BUILDER VIEW ============ -->
  <section class="view hidden" id="view-builder">
    <div class="view-title">
      <h2 id="builderTitle">قالب جديد</h2>
      <div class="toolbar">
        <button class="btn btn-light" id="btnBackFromBuilder"><span id="lblBackBuilder"></span></button>
        <button class="btn btn-primary" id="btnSaveTemplate">💾 <span id="lblSaveTemplate"></span></button>
      </div>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="field-group">
        <label id="tplNameLabelEl">اسم النموذج <span class="req">*</span></label>
        <input type="text" id="tplName" placeholder="">
      </div>
      <div class="field-group">
        <label id="tplCategoryLabelEl">الفئة</label>
        <input type="text" id="tplCategory" list="catList" placeholder="">
        <datalist id="catList"></datalist>
      </div>
    </div>
    <div class="panel">
      <h3 id="builderFieldsTitleEl">حقول النموذج</h3>
      <div id="builderFields"></div>
      <button class="btn btn-light btn-sm" id="btnAddField">➕ <span id="lblAddFieldBtn"></span></button>
    </div>
  </section>

  <!-- ============ LOG VIEW ============ -->
  <section class="view hidden" id="view-log">
    <div class="view-title">
      <h2 id="logTitleEl">سجل التقارير المحفوظة</h2>
      <div class="toolbar">
        <button class="btn btn-light" id="btnExportAll">⬇️ <span id="lblExportAll"></span></button>
        <label class="btn btn-light" style="position:relative;overflow:hidden">
          ⬆️ <span id="lblImportFile"></span>
          <input type="file" id="importFile" accept="application/json" style="position:absolute;inset:0;opacity:0;cursor:pointer">
        </label>
      </div>
    </div>
    <div class="search-row">
      <input type="text" id="logSearch" placeholder="">
    </div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr><th id="thName"></th><th id="thCategory"></th><th id="thDate"></th><th id="thActions"></th></tr></thead>
        <tbody id="logTbody"></tbody>
      </table>
    </div>
  </section>

</div>

<footer class="app-footer no-print">
  <span id="footerTextEl"></span>
</footer>

<div class="toast" id="toast"></div>

<script>

function categoryById(id){ return CATEGORIES.find(c=>c.id===id); }
function categoryLabel(catValue){ const c=categoryById(catValue); return c ? L(c) : catValue; }
function categoryIcon(catValue){ const c=categoryById(catValue); return c ? c.icon : '🗂️'; }

function esc(v){
  if(v===undefined || v===null) return '';
  return String(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function L(val){
  if(val===undefined || val===null) return '';
  if(typeof val==='object') return val[state.lang] || val.ar || val.fr || '';
  return String(val);
}
function colId(c){ return (c && typeof c==='object') ? c.id : c; }
function optionId(o){ return (o && typeof o==='object') ? o.id : o; }
function uid(prefix){ return (prefix||'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function loadJSON(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

  sel.innerHTML = `<option value="">${esc(STRINGS[state.lang].allCategories)}</option>` + cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}

  renderCategoryFilterOptions();
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const catF = document.getElementById('categoryFilter').value;
  const tpls = allTemplates().filter(t=>{
    const catLbl = categoryLabel(t.category);
    if(catF && catLbl!==catF) return false;
    if(q && !L(t.name).toLowerCase().includes(q)) return false;
    return true;
  });
  const byCat = {};
  tpls.forEach(t=>{ const c = categoryLabel(t.category); (byCat[c] = byCat[c]||[]).push(t); });

  const container = document.getElementById('templatesContainer');
  const cats = Object.keys(byCat);
  if(cats.length===0){
    container.innerHTML = `<div class="empty">${esc(S.emptyTemplates)}</div>`;
    return;
  }
  container.innerHTML = cats.map(cat=>{
    const cards = byCat[cat].map(t=>{
      const isCustom = !t.builtin;
      const name = L(t.name);
      return `
      <div class="tpl-card">
        <div class="top">
          <span class="emoji">${categoryIcon(t.category)}</span>
          <span class="name">${esc(name)}</span>
          ${isCustom ? `<span class="badge-custom">${esc(S.customBadge)}</span>` : ''}
        </div>
        <div class="meta">${t.fields.length} ${esc(S.fieldsCountSuffix)}</div>
        <div class="actions">
          <button class="btn btn-primary btn-sm" data-act="open" data-id="${esc(t.id)}">${esc(S.openTemplateBtn)}</button>
          ${isCustom
            ? `<button class="btn btn-light btn-sm" data-act="edit" data-id="${esc(t.id)}">${esc(S.editBtn)}</button>
               <button class="btn btn-danger btn-sm" data-act="del" data-id="${esc(t.id)}">${esc(S.deleteBtn)}</button>`
            : `<button class="btn btn-light btn-sm" data-act="dup" data-id="${esc(t.id)}">${esc(S.duplicateEditBtn)}</button>`
          }
        </div>
      </div>`;
    }).join('');
    return `<div class="cat-block"><h3>${categoryIcon(tpls.find(t=>categoryLabel(t.category)===cat).category)} ${esc(cat)}</h3><div class="cards-grid">${cards}</div></div>`;
  }).join('');
}

document.getElementById('templatesContainer').addEventListener('click', e=>{
  const btn = e.target.closest('button[data-act]');
  if(!btn) return;
  const id = btn.dataset.id;
  const act = btn.dataset.act;
  const tpl = findTemplate(id);
  if(!tpl) return;
  if(act==='open') openFillView(tpl, null);
  else if(act==='dup') openBuilder(cloneTemplateForEdit(tpl), true);
  else if(act==='edit') openBuilder(tpl, false);
  else if(act==='del'){
    if(confirm(STRINGS[state.lang].confirmDeleteTemplate(L(tpl.name)))){
      state.customTemplates = state.customTemplates.filter(t=>t.id!==id);
      saveJSON(K_TEMPLATES, state.customTemplates);
      renderHome();
      toast(STRINGS[state.lang].templateDeletedToast);
    }
  }
});
document.getElementById('searchInput').addEventListener('input', renderHome);
document.getElementById('categoryFilter').addEventListener('change', renderHome);

/* ============================= شاشة تعبئة النموذج ============================= */
function openFillView(tpl, existingReport){
  state.currentTemplate = tpl;
  state.currentReportId = existingReport ? existingReport.id : null;
  state.formValues = existingReport ? JSON.parse(JSON.stringify(existingReport.values)) : {};
  state.extraFields = existingReport ? JSON.parse(JSON.stringify(existingReport.extraFields||[])) : [];

  // تهيئة قيم افتراضية
  tpl.fields.forEach(f=>{
    if(state.formValues[f.id] !== undefined) return;
    if(f.type==='table') state.formValues[f.id] = [ blankRow(f.columns) ];
    else if(f.type==='date' && !existingReport) state.formValues[f.id] = todayISO();
    else state.formValues[f.id] = '';
  });

  document.getElementById('fillTitle').textContent = L(tpl.name);
  renderFillForm();
  renderExtraFields();
  renderDocPreview();
  showView('view-fill');
}
function blankRow(columns){ const o={}; columns.forEach(c=>o[colId(c)]=''); return o; }

function renderFillForm(){
  const tpl = state.currentTemplate;
  const wrap = document.getElementById('formFields');
  wrap.innerHTML = tpl.fields.map(f=>renderFieldInput(f)).join('');
  tpl.fields.forEach(f=>{
    if(f.type==='table'){
      bindTableEvents(f);
    } else {
      const el = document.getElementById('inp_'+f.id);
      if(!el) return;
      const evt = (f.type==='checkbox') ? 'change' : 'input';
      el.addEventListener(evt, ()=>{
        state.formValues[f.id] = f.type==='checkbox' ? el.checked : el.value;
        renderDocPreview();
      });
    }
  });
}

function renderFieldInput(f){
  const S = STRINGS[state.lang];
  const val = state.formValues[f.id];
  const reqMark = f.required ? '<span class="req">*</span>' : '';
  const label = esc(L(f.label));
  switch(f.type){
    case 'textarea':
      return `<div class="field-group"><label>${label} ${reqMark}</label><textarea id="inp_${f.id}">${esc(val)}</textarea></div>`;
    case 'select':
      return `<div class="field-group"><label>${label} ${reqMark}</label>
        <select id="inp_${f.id}">
          <option value="">${esc(S.selectPlaceholderOpt)}</option>
          ${(f.options||[]).map(o=>`<option value="${esc(optionId(o))}" ${val===optionId(o)?'selected':''}>${esc(L(o))}</option>`).join('')}
        </select></div>`;
    case 'checkbox':
      return `<div class="field-group checkbox-row"><input type="checkbox" id="inp_${f.id}" ${val?'checked':''}><label>${label}</label></div>`;
    case 'table':
      return `<div class="field-group">
        <label>${label}</label>
        <table class="dyn-table" id="tbl_${f.id}">
          <thead><tr>${f.columns.map(c=>`<th>${esc(L(c))}</th>`).join('')}<th></th></tr></thead>
          <tbody>${renderTableRows(f)}</tbody>
        </table>
        <button type="button" class="btn btn-light btn-sm" style="margin-top:6px" data-add-row="${f.id}">${esc(S.addRowBtn)}</button>
      </div>`;
    case 'date': case 'time': case 'number':
      return `<div class="field-group"><label>${label} ${reqMark}</label><input type="${f.type}" id="inp_${f.id}" value="${esc(val)}"></div>`;
    default: // text
      return `<div class="field-group"><label>${label} ${reqMark}</label><input type="text" id="inp_${f.id}" value="${esc(val)}"></div>`;
  }
}

function renderTableRows(f){
  const rows = state.formValues[f.id] || [];
  return rows.map((row,ri)=>`
    <tr data-row="${ri}">
      ${f.columns.map(c=>`<td><input type="text" data-col="${esc(colId(c))}" value="${esc(row[colId(c)]||'')}"></td>`).join('')}
      <td><button type="button" class="rm-row-btn" data-rm-row="${ri}">${esc(STRINGS[state.lang].deleteRowBtn)}</button></td>
    </tr>`).join('');
}

function bindTableEvents(f){
  const tbl = document.getElementById('tbl_'+f.id);
  const addBtn = document.querySelector(`[data-add-row="${f.id}"]`);
  addBtn.addEventListener('click', ()=>{
    state.formValues[f.id].push(blankRow(f.columns));
    tbl.querySelector('tbody').innerHTML = renderTableRows(f);
    bindTableRowEvents(f, tbl);
    renderDocPreview();
  });
  bindTableRowEvents(f, tbl);
}
function bindTableRowEvents(f, tbl){
  tbl.querySelectorAll('input[data-col]').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const ri = +inp.closest('tr').dataset.row;
      state.formValues[f.id][ri][inp.dataset.col] = inp.value;
      renderDocPreview();
    });
  });
  tbl.querySelectorAll('[data-rm-row]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ri = +btn.dataset.rmRow;
      state.formValues[f.id].splice(ri,1);
      if(state.formValues[f.id].length===0) state.formValues[f.id].push(blankRow(f.columns));
      tbl.querySelector('tbody').innerHTML = renderTableRows(f);
      bindTableRowEvents(f, tbl);
      renderDocPreview();
    });
  });
}

/* ---- حقول إضافية عند التعبئة (مرونة إضافية لكل تقرير) ---- */
function renderExtraFields(){
  const wrap = document.getElementById('extraFieldsList');
  if(state.extraFields.length===0){
    wrap.innerHTML = `<div style="color:var(--muted);font-size:.82rem;margin-bottom:8px">${esc(STRINGS[state.lang].noExtraFieldsMsg)}</div>`;
    return;
  }
  wrap.innerHTML = state.extraFields.map((ef,i)=>`
    <div class="extra-field-row" data-i="${i}">
      <div class="grow">
        <label style="font-size:.8rem;font-weight:700">${esc(ef.label)}</label>
        ${ef.type==='textarea'
          ? `<textarea data-extra-val="${i}">${esc(ef.value)}</textarea>`
          : `<input type="${ef.type}" data-extra-val="${i}" value="${esc(ef.value)}">`}
      </div>
      <button type="button" class="rm" data-extra-rm="${i}">🗑️</button>
    </div>
  `).join('');
  wrap.querySelectorAll('[data-extra-val]').forEach(el=>{
    el.addEventListener('input', ()=>{
      state.extraFields[+el.dataset.extraVal].value = el.value;
      renderDocPreview();
    });
  });
  wrap.querySelectorAll('[data-extra-rm]').forEach(btn=>{
    btn.addEventListener('click', ()=>{

      renderDocPreview();

}

document.getElementById('btnAddExtraField').addEventListener('click', ()=>{
  const S = STRINGS[state.lang];
  const label = prompt(S.extraFieldLabelPrompt);
  if(!label) return;
  const typeChoice = prompt(S.extraFieldTypePrompt, '1');
  const map = {'1':'text','2':'textarea','3':'number','4':'date'};
  const type = map[typeChoice] || 'text';
  state.extraFields.push({id:uid('ex'), label, type, value:''});
  renderExtraFields();
  renderDocPreview();
});

/* ---- معاينة الطباعة ---- */
function renderFieldPreview(f){
  const S = STRINGS[state.lang];
  const val = state.formValues[f.id];
  const label = esc(L(f.label));
  if(f.type==='table'){
    const rows = (val||[]).filter(r=>f.columns.some(c=>(r[colId(c)]||'').trim()!==''));
    if(rows.length===0) return '';
    return `<div class="doc-row"><div class="lbl">${label}</div>
      <table class="doc-table"><thead><tr>${f.columns.map(c=>`<th>${esc(L(c))}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${f.columns.map(c=>`<td>${esc(r[colId(c)]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
  }
  if(f.type==='checkbox'){
    return `<div class="doc-row"><span class="lbl">${label}:</span> ${val ? S.yesLabel : S.noLabel}</div>`;
  }
  if(f.type==='select'){
    if(!val) return '';
    const opt = (f.options||[]).find(o=>optionId(o)===val);
    return `<div class="doc-row"><div class="lbl">${label}</div><div class="val">${esc(opt ? L(opt) : val)}</div></div>`;
  }
  if(val===undefined || val===null || String(val).trim()==='') return '';
  return `<div class="doc-row"><div class="lbl">${label}</div><div class="val">${esc(val)}</div></div>`;
}

function renderDocPreview(){
  const S = STRINGS[state.lang];
  const tpl = state.currentTemplate;
  const s = state.settings;
  const fieldsHtml = tpl.fields.map(renderFieldPreview).join('');
  const extraHtml = state.extraFields.filter(ef=>String(ef.value).trim()!=='').map(ef=>
    `<div class="doc-row"><div class="lbl">${esc(ef.label)}</div><div class="val">${esc(ef.value)}</div></div>`
  ).join('');
  document.getElementById('docPreview').innerHTML = `
    <div class="doc-head">
      <div class="kingdom">${esc(S.kingdomLine)}</div>
      <div class="line">${esc(S.ministryLine)}</div>
      <div class="line">${esc(s.academy || S.lhAcadDefault)} — ${esc(s.niaba || S.lhNiabaDefault)}</div>
      <div class="inst">${esc(s.institution || S.lhInstDefault)}</div>
    </div>
    <div class="doc-title">${esc(L(tpl.name))}</div>
    <div class="doc-meta">
      <span>${esc(S.academicYearLabel)} ${esc(s.year || '—')}</span>
      <span>${esc(S.editDateLabel)} ${esc(todayISO())}</span>
    </div>
    ${fieldsHtml}
    ${extraHtml ? `<div class="doc-row"><div class="lbl" style="color:var(--gold)">${esc(S.additionalInfoLabel)}</div></div>${extraHtml}` : ''}
    <div class="doc-sign">
      <div class="box"><div class="cap">${esc(S.supervisorRole)}${s.supervisor ? '<br>'+esc(s.supervisor) : ''}</div><div class="line-blank"></div></div>
      <div class="box"><div class="cap">${esc(S.administrationRole)}</div><div class="line-blank"></div></div>
    </div>
  `;
}

document.getElementById('btnBackFromFill').addEventListener('click', ()=>{ showView('view-home'); renderHome(); });
document.getElementById('btnClearForm').addEventListener('click', ()=>{
  if(!confirm(STRINGS[state.lang].confirmClearFields)) return;
  const tpl = state.currentTemplate;
  state.formValues = {};
  state.extraFields = [];
  tpl.fields.forEach(f=>{
    if(f.type==='table') state.formValues[f.id] = [blankRow(f.columns)];
    else state.formValues[f.id] = '';
  });
  renderFillForm(); renderExtraFields(); renderDocPreview();
});
document.getElementById('btnPrintReport').addEventListener('click', ()=>window.print());
document.getElementById('btnSaveReport').addEventListener('click', ()=>{
  const S = STRINGS[state.lang];
  const tpl = state.currentTemplate;
  const missing = tpl.fields.filter(f=>f.required && f.type!=='table' && f.type!=='checkbox' && !String(state.formValues[f.id]||'').trim());
  if(missing.length){
    toast(S.missingFieldsToast(missing.map(f=>L(f.label)).join(S.listSep)));
    return;
  }
  const now = new Date();
  const record = {
    id: state.currentReportId || uid('rep'),
    templateId: tpl.id,
    templateName: L(tpl.name),
    category: categoryLabel(tpl.category),
    savedAt: now.toISOString(),
    values: JSON.parse(JSON.stringify(state.formValues)),
    extraFields: JSON.parse(JSON.stringify(state.extraFields))
  };
  const idx = state.reports.findIndex(r=>r.id===record.id);
  if(idx>=0) state.reports[idx] = record; else state.reports.unshift(record);
  state.currentReportId = record.id;
  saveJSON(K_REPORTS, state.reports);
  toast(S.savedReportToast);
});

/* ============================= بانِي القوالب (Builder) ============================= */
function cloneTemplateForEdit(tpl){
  const S = STRINGS[state.lang];
  return {
    id: uid('tpl'),
    builtin:false,
    category: categoryLabel(tpl.category),
    name: L(tpl.name) + S.duplicateSuffix,
    fields: JSON.parse(JSON.stringify(tpl.fields)).map(f=>({
      id: uid('f'),
      type: f.type,
      label: L(f.label),
      required: !!f.required,
      options: f.options ? f.options.map(o=>L(o)) : undefined,
      columns: f.columns ? f.columns.map(c=>L(c)) : undefined
    }))
  };
}

function openBuilder(tpl, isDuplicate){
  state.builderEditingId = (tpl && !isDuplicate && !tpl.builtin) ? tpl.id : null;
  const base = tpl || {name:'', category:'', fields:[]};
  document.getElementById('tplName').value = base.name;
  document.getElementById('tplCategory').value = base.category;
  state.builderFields = JSON.parse(JSON.stringify(base.fields));
  populateCatList();
  renderBuilderFields();
  document.getElementById('builderTitle').textContent = state.builderEditingId ? STRINGS[state.lang].builderEditTitle : STRINGS[state.lang].builderNewTitle;
  showView('view-builder');
}
function populateCatList(){
  const dl = document.getElementById('catList');
  const predefined = CATEGORIES.map(c=>L(c));
  const customCats = state.customTemplates.map(t=>t.category);
  const cats = [...new Set(predefined.concat(customCats))];
  dl.innerHTML = cats.map(c=>`<option value="${esc(c)}">`).join('');
}

function renderBuilderFields(){
  const S = STRINGS[state.lang];
  const wrap = document.getElementById('builderFields');
  if(state.builderFields.length===0){
    wrap.innerHTML = `<div class="empty" style="margin-bottom:12px">${esc(S.noFieldsYet)}</div>`;
    return;
  }
  wrap.innerHTML = state.builderFields.map((f,i)=>`
    <div class="field-editor" data-i="${i}">
      <div class="row1">
        <input type="text" data-b="label" placeholder="${esc(S.fieldLabelPlaceholder)}" value="${esc(f.label)}">
        <select data-b="type">
          ${Object.entries(S.fieldTypeLabels).map(([v,l])=>`<option value="${v}" ${f.type===v?'selected':''}>${esc(l)}</option>`).join('')}
        </select>
      </div>
      ${f.type==='select' ? `<div class="row2"><textarea data-b="options" placeholder="${esc(S.optionsPlaceholder)}">${esc((f.options||[]).join('\n'))}</textarea></div>` : ''}
      ${f.type==='table' ? `<div class="row2"><textarea data-b="columns" placeholder="${esc(S.columnsPlaceholder)}">${esc((f.columns||[]).join('\n'))}</textarea></div>` : ''}
      <div class="row3">
        <label class="req-check"><input type="checkbox" data-b="required" ${f.required?'checked':''}> ${esc(S.requiredFieldLabel)}</label>
        <div class="move-btns">
          <button type="button" data-b="up" title="${esc(S.moveUpTitle)}">⬆️</button>
          <button type="button" data-b="down" title="${esc(S.moveDownTitle)}">⬇️</button>
          <button type="button" data-b="del" title="${esc(S.deleteFieldTitle)}">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');

  wrap.querySelectorAll('.field-editor').forEach(box=>{
    const i = +box.dataset.i;
    box.querySelector('[data-b=label]').addEventListener('input', e=>state.builderFields[i].label = e.target.value);
    box.querySelector('[data-b=type]').addEventListener('change', e=>{
      state.builderFields[i].type = e.target.value;
      if(e.target.value==='select' && !state.builderFields[i].options) state.builderFields[i].options=[];
      if(e.target.value==='table' && !state.builderFields[i].columns) state.builderFields[i].columns = STRINGS[state.lang].defaultColumns.slice();
      renderBuilderFields();
    });
    const opt = box.querySelector('[data-b=options]');
    if(opt) opt.addEventListener('input', e=>{ state.builderFields[i].options = e.target.value.split('\n').map(s=>s.trim()).filter(Boolean); });
    const cols = box.querySelector('[data-b=columns]');
    if(cols) cols.addEventListener('input', e=>{ state.builderFields[i].columns = e.target.value.split('\n').map(s=>s.trim()).filter(Boolean); });
    box.querySelector('[data-b=required]').addEventListener('change', e=>state.builderFields[i].required = e.target.checked);
    box.querySelector('[data-b=up]').addEventListener('click', ()=>{
      if(i===0) return;
      [state.builderFields[i-1], state.builderFields[i]] = [state.builderFields[i], state.builderFields[i-1]];
      renderBuilderFields();
    });
    box.querySelector('[data-b=down]').addEventListener('click', ()=>{
      if(i===state.builderFields.length-1) return;
      [state.builderFields[i+1], state.builderFields[i]] = [state.builderFields[i], state.builderFields[i+1]];
      renderBuilderFields();
    });
    box.querySelector('[data-b=del]').addEventListener('click', ()=>{
      state.builderFields.splice(i,1);
      renderBuilderFields();
    });
  });
}

document.getElementById('btnAddField').addEventListener('click', ()=>{
  state.builderFields.push({id: uid('f'), type:'text', label:'', required:false});
  renderBuilderFields();
});
document.getElementById('btnNewTpl').addEventListener('click', ()=>openBuilder(null,false));
document.getElementById('btnBackFromBuilder').addEventListener('click', ()=>{ showView('view-home'); renderHome(); });

document.getElementById('btnSaveTemplate').addEventListener('click', ()=>{
  const S = STRINGS[state.lang];
  const name = document.getElementById('tplName').value.trim();
  const category = document.getElementById('tplCategory').value.trim() || categoryLabel('other');
  if(!name){ toast(S.nameRequiredToast); return; }
  if(state.builderFields.length===0){ toast(S.atLeastOneFieldToast); return; }
  const emptyLabel = state.builderFields.find(f=>!f.label.trim());
  if(emptyLabel){ toast(S.fieldNoLabelToast); return; }

  if(state.builderEditingId){
    const idx = state.customTemplates.findIndex(t=>t.id===state.builderEditingId);
    if(idx>=0){
      state.customTemplates[idx] = {...state.customTemplates[idx], name, category, fields: state.builderFields};
    }
  } else {
    state.customTemplates.push({ id: uid('tpl'), builtin:false, name, category, fields: state.builderFields });
  }
  saveJSON(K_TEMPLATES, state.customTemplates);
  toast(S.templateSavedToast);
  showView('view-home');
  renderHome();
});

/* ============================= سجل التقارير ============================= */
function renderLog(){
  const S = STRINGS[state.lang];
  const q = (document.getElementById('logSearch').value||'').trim().toLowerCase();
  const rows = state.reports.map(r=>{
    const tpl = findTemplate(r.templateId);
    return {
      rec: r,
      nameDisp: tpl ? L(tpl.name) : r.templateName,
      catDisp: tpl ? categoryLabel(tpl.category) : r.category
    };
  }).filter(x=> !q || x.nameDisp.toLowerCase().includes(q) || x.catDisp.toLowerCase().includes(q));
  const tbody = document.getElementById('logTbody');
  if(rows.length===0){
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px">${esc(S.logEmptyMsg)}</td></tr>`;
    return;
  }
  const locale = state.lang==='ar' ? 'ar-MA' : 'fr-MA';
  tbody.innerHTML = rows.map(x=>{
    const r = x.rec;
    const d = new Date(r.savedAt);
    const dateStr = d.toLocaleDateString(locale) + ' ' + d.toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit'});
    return `<tr>
      <td>${esc(x.nameDisp)}</td>
      <td>${esc(x.catDisp)}</td>
      <td>${esc(dateStr)}</td>
      <td>
        <button class="btn btn-primary btn-sm" data-log-act="open" data-id="${esc(r.id)}">${esc(S.openBtn)}</button>
        <button class="btn btn-light btn-sm" data-log-act="dup" data-id="${esc(r.id)}">${esc(S.duplicateBtn)}</button>
        <button class="btn btn-danger btn-sm" data-log-act="del" data-id="${esc(r.id)}">${esc(S.deleteBtn)}</button>
      </td>
    </tr>`;
  }).join('');
}
document.getElementById('logTbody').addEventListener('click', e=>{
  const S = STRINGS[state.lang];
  const btn = e.target.closest('button[data-log-act]');
  if(!btn) return;
  const rec = state.reports.find(r=>r.id===btn.dataset.id);
  if(!rec) return;
  const tpl = findTemplate(rec.templateId);
  if(btn.dataset.logAct==='open'){
    if(!tpl){ toast(S.templateNotFoundToast); return; }
    openFillView(tpl, rec);
  } else if(btn.dataset.logAct==='dup'){
    if(!tpl){ toast(S.templateNotFoundToast); return; }
    openFillView(tpl, {...rec, id:null});
  } else if(btn.dataset.logAct==='del'){
    if(confirm(S.confirmDeleteReport)){
      state.reports = state.reports.filter(r=>r.id!==rec.id);
      saveJSON(K_REPORTS, state.reports);
      renderLog();
      toast(S.reportDeletedToast);
    }
  }
});
document.getElementById('logSearch').addEventListener('input', renderLog);

document.getElementById('btnExportAll').addEventListener('click', ()=>{
  const S = STRINGS[state.lang];
  const data = { settings: state.settings, customTemplates: state.customTemplates, reports: state.reports, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = S.backupFilenamePrefix + todayISO() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('importFile').addEventListener('change', e=>{
  const S = STRINGS[state.lang];
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(data.settings) state.settings = {...state.settings, ...data.settings};
      if(Array.isArray(data.customTemplates)) state.customTemplates = state.customTemplates.concat(data.customTemplates);
      if(Array.isArray(data.reports)) state.reports = data.reports.concat(state.reports);
      saveJSON(K_SETTINGS, state.settings);
      saveJSON(K_TEMPLATES, state.customTemplates);
      saveJSON(K_REPORTS, state.reports);
      renderLetterheadBar(); renderLog();
      toast(S.importSuccessToast);
    }catch(err){ toast(S.importInvalidToast); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

/* ============================= إعدادات المؤسسة ============================= */
function openSettingsModal(){
  const S = STRINGS[state.lang];
  const s = state.settings;
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h3>${esc(S.settingsModalTitle)}</h3>
      <div class="field-group"><label>${esc(S.settingsInstLabel)}</label><input type="text" id="stInst" value="${esc(s.institution)}"></div>
      <div class="field-group"><label>${esc(S.settingsNiabaLabel)}</label><input type="text" id="stNiaba" value="${esc(s.niaba)}"></div>
      <div class="field-group"><label>${esc(S.settingsAcadLabel)}</label><input type="text" id="stAcad" value="${esc(s.academy)}"></div>
      <div class="field-group"><label>${esc(S.settingsYearLabel)}</label><input type="text" id="stYear" value="${esc(s.year)}" placeholder="${esc(S.settingsYearPlaceholder)}"></div>
      <div class="field-group"><label>${esc(S.settingsSupervisorLabel)}</label><input type="text" id="stSup" value="${esc(s.supervisor)}"></div>
      <div class="modal-actions">
        <button class="btn btn-light" id="stCancel">${esc(S.cancelBtn)}</button>
        <button class="btn btn-primary" id="stSave">${esc(S.saveBtn)}</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#stCancel').addEventListener('click', ()=>bg.remove());
  bg.addEventListener('click', e=>{ if(e.target===bg) bg.remove(); });
  bg.querySelector('#stSave').addEventListener('click', ()=>{
    state.settings = {
      institution: bg.querySelector('#stInst').value.trim(),
      niaba: bg.querySelector('#stNiaba').value.trim(),
      academy: bg.querySelector('#stAcad').value.trim(),
      year: bg.querySelector('#stYear').value.trim(),
      supervisor: bg.querySelector('#stSup').value.trim()
    };
    saveJSON(K_SETTINGS, state.settings);
    renderLetterheadBar();
    if(state.currentTemplate) renderDocPreview();
    bg.remove();
    toast(S.settingsSavedToast);
  });
}
document.getElementById('btnSettings').addEventListener('click', openSettingsModal);

/* ============================= أزرار الرأس ============================= */
document.getElementById('btnHome').addEventListener('click', ()=>{ showView('view-home'); renderHome(); });
document.getElementById('btnLog').addEventListener('click', ()=>{ renderLog(); showView('view-log'); });

/* ============================= بدء التشغيل ============================= */
function init(){
  applyLangToDocument();
  if(!state.settings.year){
    const y = new Date().getFullYear();
    const m = new Date().getMonth(); // بعد شتنبر تبدأ السنة الدراسية الجديدة
    state.settings.year = (m>=8) ? `${y}-${y+1}` : `${y-1}-${y}`;
  }
  applyStaticStrings();
  renderLetterheadBar();
  renderHome();

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}
init();
})();
</script>
