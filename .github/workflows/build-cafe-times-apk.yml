name: Build Café Times APK

on:
  push:
    branches:
      - main
      - claude/apk-app-deployment-iaz0dk
    paths:
      - 'android-cafe-times/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-cafe-times/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android-cafe-times/local.properties

      - name: Build Debug APK
        run: |
          cd android-cafe-times
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -100

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cafe-times-debug-apk
          path: android-cafe-times/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Copy APK to apk directory
        run: |
          mkdir -p apk
          cp android-cafe-times/app/build/outputs/apk/debug/app-debug.apk apk/cafe-times-agadir.apk
          echo "APK ready: apk/cafe-times-agadir.apk"
