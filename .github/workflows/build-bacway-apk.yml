name: Build BAC WAY CENTER APK

on:
  push:
    paths:
      - 'android-bacway/**'
      - 'bacway-center/**'
      - '.github/workflows/build-bacway-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync BAC WAY CENTER website to assets
        run: |
          cp bacway-center/index.html android-bacway/app/src/main/assets/index.html
          cp -r bacway-center/images/* android-bacway/app/src/main/assets/images/

      - name: Make gradlew executable
        run: chmod +x android-bacway/gradlew

      - name: Build Debug APK
        run: |
          cd android-bacway
          ./gradlew assembleDebug --no-daemon

      - name: Copy APK to apk folder
        run: |
          cp android-bacway/app/build/outputs/apk/debug/app-debug.apk apk/bacway-center.apk
          echo "APK size: $(du -sh apk/bacway-center.apk)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bacway-center-apk
          path: apk/bacway-center.apk
          retention-days: 30

      - name: Commit APK to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apk/bacway-center.apk
          git diff --staged --quiet || git commit -m "build: update BAC WAY CENTER APK [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
