[build]
  publish = "."

# Service Worker — لا يُخزَّن مؤقتاً لضمان تحديث فوري
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# manifest.json — لا يُخزَّن مؤقتاً
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

# الأصول الثابتة — تُخزَّن لمدة سنة
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# الخطوط والأيقونات
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# الصفحة الرئيسية وكل الصفحات
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# نور ريم — يحتاج إذن الميكروفون فعلياً لتسجيل صوت ريم وتلاوة الأب
[[headers]]
  for = "/noor-rim-quran/*"
  [headers.values]
    Permissions-Policy = "microphone=(self), camera=(), geolocation=()"
