    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1e3a5f;
      --accent: #f5a623;
      --green: #27ae60;
      --blue: #2980b9;
      --purple: #8e44ad;
      --red: #e74c3c;
      --gray: #95a5a6;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 60%, #1a365d 100%);
      color: white;
      padding: 28px 24px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 .icon { font-size: 1.8rem; }
    header p { font-size: 0.82rem; opacity: 0.75; margin-top: 4px; }

    .header-stats {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .stat-pill {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-pill span { font-weight: 700; font-size: 1rem; }

    /* ===== CONTROLS ===== */
    .controls {
      padding: 18px 24px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 9px 16px 9px 40px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: inherit;
      direction: rtl;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      color: var(--muted);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ===== GRID ===== */
    .grid {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border: 1px solid #e8edf2;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0; left: 0;
      height: 4px;
      border-radius: 14px 14px 0 0;
    }
    .card.cat-education::before { background: linear-gradient(90deg, #2980b9, #27ae60); }
    .card.cat-portal::before { background: linear-gradient(90deg, #8e44ad, #2980b9); }
    .card.cat-health::before { background: linear-gradient(90deg, #27ae60, #f5a623); }
    .card.cat-personal::before { background: linear-gradient(90deg, #e74c3c, #f5a623); }
    .card.cat-resource::before { background: linear-gradient(90deg, #f5a623, #e67e22); }
    .card.cat-other::before { background: linear-gradient(90deg, #95a5a6, #7f8c8d); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-icon {
      font-size: 2rem;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cat-education .card-icon { background: #eaf4fb; }
    .cat-portal .card-icon { background: #f4eafb; }
    .cat-health .card-icon { background: #eafbf0; }
    .cat-personal .card-icon { background: #fbeaea; }
    .cat-resource .card-icon { background: #fbf4ea; }
    .cat-other .card-icon { background: #f4f4f4; }

    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-active { background: #d4efdf; color: #1e8449; }
    .badge-progress { background: #fef9e7; color: #b7950b; }
    .badge-archived { background: #f2f3f4; color: #7f8c8d; }

    .lang-badge {
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 600;
      background: #eaf0fb;
      color: #2c5282;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 14px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.73rem;
      color: var(--muted);
      padding-top: 12px;
      border-top: 1px solid #f0f4f8;
      margin-bottom: 12px;
    }

    .card-links {
      display: flex;
      gap: 8px;
    }
    .link-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .link-github {
      background: #f6f8fa;
      color: #24292e;
      border: 1px solid #d0d7de;
    }
    .link-github:hover { background: #24292e; color: white; }
    .link-netlify {
      background: #f0f8ff;
      color: #00ad9f;
      border: 1px solid #b3e0dc;
    }
    .link-netlify:hover { background: #00ad9f; color: white; }
    .link-site {
      background: #f0fff4;
      color: #276749;
      border: 1px solid #9ae6b4;
    }
    .link-site:hover { background: #276749; color: white; }

    /* ===== EMPTY STATE ===== */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .empty-icon { font-size: 4rem; margin-bottom: 12px; }
    .empty p { font-size: 1rem; }

    /* ===== NOTES MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      direction: rtl;
    }
    .modal h3 { margin-bottom: 14px; font-size: 1.1rem; }
    .modal textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: inherit;
      direction: rtl;
      resize: vertical;
      outline: none;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      justify-content: flex-end;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2c5282; }
    .btn-ghost { background: #f0f4f8; color: var(--muted); }
    .btn-ghost:hover { background: #e2e8f0; }

    .note-display {
      margin-top: 10px;
      padding: 8px 12px;
      background: #fffbeb;
      border-right: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 0.78rem;
      color: #744210;
      line-height: 1.5;
    }

    .note-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .note-btn:hover { background: #f0f4f8; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid #e2e8f0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .grid { padding: 14px; gap: 12px; }
      header { padding: 20px 16px 14px; }
      .controls { padding: 12px 16px; }
    }
  </style>
</head>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">

</div>

<footer>تم بناؤه خصيصاً لأحمد بوعمود • البيانات محفوظة محلياً في المتصفح</footer>

function getNotes() {
  try { return JSON.parse(localStorage.getItem('project_notes') || '{}'); } catch { return {}; }
}
function saveNotes(notes) {
  localStorage.setItem('project_notes', JSON.stringify(notes));
}

function getStatusBadge(s) {
  if (s === 'active') return '<span class="badge badge-active">● نشط</span>';
  if (s === 'progress') return '<span class="badge badge-progress">◐ قيد الإنجاز</span>';
  return '<span class="badge badge-archived">○ مؤرشف</span>';
}

function renderCard(p) {
  const notes = getNotes();
  const note = notes[p.id] || '';
  const noteHtml = note
    ? `<div class="note-display">📌 ${note}</div>`
    : '';
  const linksHtml = [
    `<a href="${p.github}" target="_blank" class="link-btn link-github">⚙ GitHub</a>`,
    p.netlify ? `<a href="${p.netlify}" target="_blank" class="link-btn link-netlify">▲ Netlify</a>` : '',
    p.site ? `<a href="${p.site}" target="_blank" class="link-btn link-site">🌐 الموقع</a>` : ''
  ].filter(Boolean).join('');

  return `
  <div class="card cat-${p.category}" data-id="${p.id}" data-cat="${p.category}" data-name="${p.name}" data-desc="${p.desc}">
    <div class="card-header">
      <div class="card-icon">${p.icon}</div>
      <div class="card-badges">
        ${getStatusBadge(p.status)}
        <span class="lang-badge">${p.lang}</span>
      </div>
    </div>
    <div class="card-title">${p.name}</div>
    <div class="card-desc">${p.desc}</div>
    ${noteHtml}
    <div class="card-meta">
      <span>🕓 ${p.updated}</span>
      <button class="note-btn" onclick="openModal('${p.id}', '${p.name.replace(/'/g, "\\'")}')">
        ${note ? '✏️ تعديل الملاحظة' : '+ إضافة ملاحظة'}
      </button>
    </div>
    <div class="card-links">${linksHtml}</div>
  </div>`;
}

function filterProjects() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const cat = card.dataset.cat;
    const name = card.dataset.name.toLowerCase();
    const desc = card.dataset.desc.toLowerCase();
    const matchCat = currentFilter === 'all' || cat === currentFilter;
    const matchSearch = !query || name.includes(query) || desc.includes(query);
    card.style.display = matchCat && matchSearch ? '' : 'none';
    if (matchCat && matchSearch) visible++;
  });
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = visible === 0 ? '' : 'none';
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProjects();
}

function openModal(id, name) {
  const notes = getNotes();
  currentNote = id;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-textarea').value = notes[id] || '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-textarea').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentNote = null;
}

function saveNote() {
  if (!currentNote) return;
  const val = document.getElementById('modal-textarea').value.trim();
  const notes = getNotes();
  if (val) notes[currentNote] = val;
  else delete notes[currentNote];
  saveNotes(notes);
  closeModal();
  renderAll();
}

function renderAll() {
  const active = PROJECTS.filter(p => p.status === 'active').length;
  const progress = PROJECTS.filter(p => p.status === 'progress').length;
  document.getElementById('total-count').textContent = PROJECTS.length;
  document.getElementById('active-count').textContent = active;
  document.getElementById('progress-count').textContent = progress;

  const grid = document.getElementById('grid');
  grid.innerHTML = PROJECTS.map(renderCard).join('') +
    `<div class="empty" id="empty-state" style="display:none">
      <div class="empty-icon">🔍</div>
      <p>لا توجد مشاريع تطابق بحثك</p>
    </div>`;
  filterProjects();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderAll();
</script>
</body>
</html>
