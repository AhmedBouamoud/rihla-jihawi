<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-label="شهادة نهاية الدرس">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7e6c7"/><stop offset="1" stop-color="#d2a66c"/></linearGradient>
  <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d2b20"/><stop offset="1" stop-color="#7b4f2c"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3b2415" flood-opacity="0.22"/></filter>
  <style>
    .title{font:700 42px Tahoma,Arial,sans-serif; fill:#3b2415}
    .sub{font:600 24px Tahoma,Arial,sans-serif; fill:#5a3a24}
    .txt{font:500 21px Tahoma,Arial,sans-serif; fill:#3b2415}
    .small{font:500 17px Tahoma,Arial,sans-serif; fill:#4c3322}
    .label{font:700 18px Tahoma,Arial,sans-serif; fill:#fff}
    .card{fill:#fff9ef; stroke:#9b6b3d; stroke-width:2; filter:url(#shadow)}
  </style>
</defs>

<rect width="1600" height="1100" fill="#fff8e9"/>
<rect x="70" y="70" width="1460" height="960" rx="42" fill="none" stroke="#8c5a32" stroke-width="16"/>
<rect x="115" y="115" width="1370" height="870" rx="30" fill="none" stroke="#d2a66c" stroke-width="6"/>
<text x="800" y="230" text-anchor="middle" class="title">شهادة مؤرخ ناشئ</text>
<text x="800" y="310" text-anchor="middle" class="sub">تُمنح هذه الشهادة للتلميذ(ة)</text>
<rect x="430" y="360" width="740" height="90" rx="20" fill="#f3e2c4" stroke="#9b6b3d" stroke-width="3"/>
<text x="800" y="420" text-anchor="middle" class="sub">[اسم التلميذ]</text>
<text x="800" y="530" text-anchor="middle" class="txt">بعد إتمام درس: الحرب العالمية الأولى: الأسباب والنتائج</text>
<text x="800" y="590" text-anchor="middle" class="txt">والنجاح في تحديات الرحلة والاختبار النهائي</text>
<text x="450" y="780" text-anchor="middle" class="small">مؤسسة الحنان</text>
<text x="1150" y="780" text-anchor="middle" class="small">توقيع الأستاذ أحمد بوعمود</text>
<path d="M970 810 H1330" stroke="#8c5a32" stroke-width="4"/>
<circle cx="800" cy="835" r="76" fill="#8c2f27" opacity=".95"/><text x="800" y="846" text-anchor="middle" class="label">WWI</text>

</svg>
