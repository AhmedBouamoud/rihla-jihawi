<circle cx="250" cy="225" r="110" fill="#c83232"/><text x="250" y="215" fill="white" font-size="30">بشرية</text><text x="250" y="255" fill="white" font-size="20">قتلى ومعطوبون</text>
<circle cx="730" cy="225" r="110" fill="#d6a83e"/><text x="730" y="215" fill="#20170b" font-size="30">اقتصادية</text><text x="730" y="255" fill="#20170b" font-size="20">ديون وتراجع</text>
<circle cx="250" cy="445" r="110" fill="#2b7bbb"/><text x="250" y="435" fill="white" font-size="30">اجتماعية</text><text x="250" y="475" fill="white" font-size="20">فقر وبطالة</text>
