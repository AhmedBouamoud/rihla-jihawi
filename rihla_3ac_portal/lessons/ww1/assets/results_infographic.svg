<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#07101d" flood-opacity=".35"/></filter>
<linearGradient id="paper" x1="0" x2="1"><stop stop-color="#f7e4bd"/><stop offset="1" stop-color="#d2aa72"/></linearGradient>
<linearGradient id="sea" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12324c"/><stop offset="1" stop-color="#0a1424"/></linearGradient>
<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff0a5"/><stop offset=".5" stop-color="#d6a83e"/><stop offset="1" stop-color="#8c5d12"/></linearGradient>
<style><![CDATA[
.ar{font-family:'Amiri','Noto Naskh Arabic','Tahoma',sans-serif;direction:rtl}
.small{font-size:18px;fill:#2b2116;font-weight:700}.label{font-size:28px;fill:#2b2116;font-weight:800}.white{fill:#fff7df}.stroke{stroke:#3d2b1a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
]]></style>
</defs>
<rect width="980" height="620" rx="42" fill="#102236"/>
