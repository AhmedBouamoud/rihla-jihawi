<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-label="بطاقات الأحداث">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7e6c7"/><stop offset="1" stop-color="#d2a66c"/></linearGradient>
  <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d2b20"/><stop offset="1" stop-color="#7b4f2c"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3b2415" flood-opacity="0.22"/></filter>
  <style>
    .title{font:700 42px Tahoma,Arial,sans-serif; fill:#3b2415}
    .sub{font:600 24px Tahoma,Arial,sans-serif; fill:#5a3a24}
    .txt{font:500 21px Tahoma,Arial,sans-serif; fill:#3b2415}
    .small{font:500 17px Tahoma,Arial,sans-serif; fill:#4c3322}
    .label{font:700 18px Tahoma,Arial,sans-serif; fill:#fff}
    .card{fill:#fff9ef; stroke:#9b6b3d; stroke-width:2; filter:url(#shadow)}
  </style>
</defs>
<rect width="1600" height="720" fill="#f6ecd9"/><text x="800" y="70" text-anchor="middle" class="title">بطاقات لعبة: رتب الأحداث</text><g transform="translate(1040,140)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1914</text><text x="330" y="112" text-anchor="end" class="txt">اغتيال ولي عهد النمسا</text><text x="330" y="150" text-anchor="end" class="txt">واندلاع الحرب</text></g><g transform="translate(560,140)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1914</text><text x="330" y="112" text-anchor="end" class="txt">حرب الخنادق</text><text x="330" y="150" text-anchor="end" class="txt">على الجبهة الغربية</text></g><g transform="translate(80,140)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1917</text><text x="330" y="112" text-anchor="end" class="txt">دخول الولايات المتحدة</text><text x="330" y="150" text-anchor="end" class="txt">إلى الحرب</text></g><g transform="translate(1040,400)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1917</text><text x="330" y="112" text-anchor="end" class="txt">انسحاب روسيا</text><text x="330" y="150" text-anchor="end" class="txt">بعد الثورة</text></g><g transform="translate(560,400)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1918</text><text x="330" y="112" text-anchor="end" class="txt">نهاية الحرب</text><text x="330" y="150" text-anchor="end" class="txt">وانتصار الوفاق</text></g><g transform="translate(80,400)"><rect width="380" height="200" rx="24" class="card"/><text x="330" y="55" text-anchor="end" class="sub">1919</text><text x="330" y="112" text-anchor="end" class="txt">مؤتمر الصلح</text><text x="330" y="150" text-anchor="end" class="txt">ومعاهدة فرساي</text></g>
</svg>
