<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" role="img" aria-label="واجهة الحرب العالمية الأولى">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7e6c7"/><stop offset="1" stop-color="#d2a66c"/></linearGradient>
  <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d2b20"/><stop offset="1" stop-color="#7b4f2c"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3b2415" flood-opacity="0.22"/></filter>
  <style>
    .title{font:700 42px Tahoma,Arial,sans-serif; fill:#3b2415}
    .sub{font:600 24px Tahoma,Arial,sans-serif; fill:#5a3a24}
    .txt{font:500 21px Tahoma,Arial,sans-serif; fill:#3b2415}
    .small{font:500 17px Tahoma,Arial,sans-serif; fill:#4c3322}
    .label{font:700 18px Tahoma,Arial,sans-serif; fill:#fff}
    .card{fill:#fff9ef; stroke:#9b6b3d; stroke-width:2; filter:url(#shadow)}
  </style>
</defs>

<rect width="1600" height="800" fill="url(#bg)"/>
<g opacity=".17" stroke="#6b4b2c" stroke-width="3" fill="none">
  <path d="M85 132 C240 78, 324 175, 480 120 S813 60, 920 146 1230 230, 1510 110"/>
  <path d="M120 245 C290 195, 440 290, 610 240 S930 160, 1080 250 1320 345, 1518 240"/>
  <path d="M180 620 C375 560, 550 690, 750 610 S1070 485, 1300 630 1460 680, 1548 590"/>
</g>
