  <path d="M0,190 C180,125 260,170 370,130 C510,75 650,190 790,125 C940,60 1040,165 1215,105 C1400,45 1500,120 1600,90 L1600,245 L0,245 Z" fill="#6d4a31"/>
  <g stroke="#1e160f" stroke-width="10"><path d="M105 150 l65 -65 M170 150 l-65 -65 M320 130 l62 -62 M382 130 l-62 -62 M1240 115 l72 -72 M1312 115 l-72 -72"/></g>
</g>
<g opacity=".85" transform="translate(1280,420)">
  <rect x="0" y="0" width="80" height="130" rx="35" fill="#2c2118"/><circle cx="40" cy="-20" r="35" fill="#57402d"/><rect x="17" y="-55" width="46" height="28" rx="12" fill="#51422f"/>
  <path d="M-80,38 h170" stroke="#2b2118" stroke-width="14" stroke-linecap="round"/>
</g>
<g transform="translate(92,88)">
  <rect width="760" height="308" rx="32" fill="#fff8e9" opacity=".90" filter="url(#shadow)"/>
  <text x="710" y="82" text-anchor="end" class="title">الحرب العالمية الأولى</text>
  <text x="710" y="132" text-anchor="end" class="sub">من شرارة سراييفو إلى عالم جديد</text>
  <text x="710" y="192" text-anchor="end" class="txt">درس تفاعلي بصري لتلاميذ الثالثة إعدادي</text>
  <text x="710" y="238" text-anchor="end" class="small">أسباب • مراحل • خنادق • نتائج • صلح</text>
</g>
<g transform="translate(1070,105)" opacity=".92">
  <circle cx="170" cy="170" r="158" fill="#fff5df" stroke="#9b6b3d" stroke-width="5" filter="url(#shadow)"/>
  <path d="M80 170 h180 M170 80 v180 M105 112 C160 150, 210 150, 238 105 M100 230 C145 190, 202 195, 235 235" stroke="#86613a" stroke-width="4" fill="none"/>
  <text x="170" y="178" text-anchor="middle" class="sub">أوروبا</text>
</g>

</svg>
