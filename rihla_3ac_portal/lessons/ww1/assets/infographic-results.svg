<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img" aria-label="إنفوغرافيا النتائج">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7e6c7"/><stop offset="1" stop-color="#d2a66c"/></linearGradient>
  <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3d2b20"/><stop offset="1" stop-color="#7b4f2c"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3b2415" flood-opacity="0.22"/></filter>
  <style>
    .title{font:700 42px Tahoma,Arial,sans-serif; fill:#3b2415}
    .sub{font:600 24px Tahoma,Arial,sans-serif; fill:#5a3a24}
    .txt{font:500 21px Tahoma,Arial,sans-serif; fill:#3b2415}
    .small{font:500 17px Tahoma,Arial,sans-serif; fill:#4c3322}
    .label{font:700 18px Tahoma,Arial,sans-serif; fill:#fff}
    .card{fill:#fff9ef; stroke:#9b6b3d; stroke-width:2; filter:url(#shadow)}
  </style>
</defs>
<rect width="1600" height="950" fill="#f3e8d5"/><text x="800" y="72" text-anchor="middle" class="title">نتائج الحرب العالمية الأولى</text><text x="800" y="116" text-anchor="middle" class="sub">حرب غيّرت الإنسان والاقتصاد والخريطة السياسية</text>
<g transform="translate(850,180)">
  <rect width="520" height="280" rx="28" class="card"/>
  <circle cx="450" cy="78" r="54" fill="#7a3328"/><text x="450" y="94" text-anchor="middle" font-size="48">👥</text>
  <text x="410" y="145" text-anchor="end" class="sub">نتائج بشرية</text>
  <text x="410" y="200" text-anchor="end" class="txt"><tspan x="410" dy="0">قتلى وجرحى ومعطوبون</tspan><tspan x="410" dy="34">أرامل ويتامى ومعاناة واسعة</tspan></text>
</g>
<g transform="translate(230,180)">
  <rect width="520" height="280" rx="28" class="card"/>
  <circle cx="450" cy="78" r="54" fill="#7a3328"/><text x="450" y="94" text-anchor="middle" font-size="48">🏭</text>
  <text x="410" y="145" text-anchor="end" class="sub">نتائج اقتصادية</text>
  <text x="410" y="200" text-anchor="end" class="txt"><tspan x="410" dy="0">دمار في المدن والمصانع</tspan><tspan x="410" dy="34">ديون وتراجع الإنتاج</tspan></text>
</g>
<g transform="translate(850,540)">
  <rect width="520" height="280" rx="28" class="card"/>
  <circle cx="450" cy="78" r="54" fill="#7a3328"/><text x="450" y="94" text-anchor="middle" font-size="48">🏛️</text>
  <text x="410" y="145" text-anchor="end" class="sub">نتائج سياسية</text>
  <text x="410" y="200" text-anchor="end" class="txt"><tspan x="410" dy="0">سقوط إمبراطوريات</tspan><tspan x="410" dy="34">ظهور دول جديدة ومعاهدة فرساي</tspan></text>
</g>
<g transform="translate(230,540)">
  <rect width="520" height="280" rx="28" class="card"/>
  <circle cx="450" cy="78" r="54" fill="#7a3328"/><text x="450" y="94" text-anchor="middle" font-size="48">🕊️</text>
  <text x="410" y="145" text-anchor="end" class="sub">نتائج اجتماعية ونفسية</text>
  <text x="410" y="200" text-anchor="end" class="txt"><tspan x="410" dy="0">صدمة الحرب وتغير الأدوار</tspan><tspan x="410" dy="34">وتزايد المطالبة بالسلم</tspan></text>
</g>
</svg>
