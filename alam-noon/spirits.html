<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1438">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="assets/css/style.css">
<title>ألبوم أرواح الحروف — عالم نون</title>


<meta name="description" content="عالم نون: مغامرة عربية خيالية للأطفال عبر خمس محطات تعليمية تفاعلية.">
<meta name="robots" content="index,follow">
<meta property="og:type" content="website">
<meta property="og:title" content="أَرْوَاحُ الحُرُوف">
<meta property="og:description" content="مغامرة عربية خيالية للأطفال لتعلم الأصوات والحروف باللعب.">
<meta property="og:image" content="assets/img/social-preview.webp">
<meta name="twitter:card" content="summary_large_image">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">

</head>
<body data-page="spirits">
<div class="app-shell">

<div id="offlineBadge" class="offline-badge"></div>
<div id="installBanner" class="install-banner">
  <p><strong>ثَبِّتْ عَالَمَ نُون</strong><br>ليفتح مثل تطبيق ويعمل بصورة أفضل على الهاتف.</p>
  <button id="installApp" class="btn primary">تَثْبِيت</button>
  <button id="closeInstall" class="icon-btn" aria-label="إغلاق">×</button>
</div>

<div class="stars"></div>
<div id="voiceCaption" class="voice-caption hidden"><span class="face">🗣️</span><span id="voiceText"></span></div>
<button id="repeatVoice" class="repeat-voice" aria-label="إعادة الاستماع">🔊</button>
<div class="page">

<header class="topbar">
  <button class="icon-btn" onclick="location.href='index.html'">→</button>
  <span class="grow pill">أَرْوَاحُ الحُرُوف</span>
  <button class="icon-btn ask-voice">❓</button>
</header>
<section class="hero" style="min-height:190px">
  <img src="assets/img/home-world.webp" alt="أرواح الحروف" loading="lazy" decoding="async">
  <div class="overlay"></div>
  <div class="caption"><h2>أَلْبُومُ أَرْوَاحِ الحُرُوف</h2><p>كُلَّمَا أَكْمَلْتَ مُهِمَّةً، تَحَرَّرَتْ رُوحُ حَرْفٍ وَانْضَمَّتْ إِلَى أَصْدِقَائِك. اِضْغَطْ عَلَى رُوحٍ لِتَسْمَعَهَا.</p></div>
</section>
<section class="card">
  <div class="status-row"><span>✨ الأَرْوَاحُ المُتَحَرِّرَة</span><span><b id="spiritCount">0</b> / 8</span></div>
  <div id="spiritGrid" class="spirit-grid"></div>
</section>
<div class="nav-bottom">
  <button class="btn secondary" onclick="location.href='index.html'">الخَرِيطَة</button>
</div>

</div>
<div id="toast" class="toast"></div>
</div>
<script src="assets/js/voice-map.js"></script>
<script src="assets/js/app.js"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}</script>
</body>
</html>
