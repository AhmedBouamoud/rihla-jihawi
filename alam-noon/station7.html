<div class="stars"></div>

<div class="page">

  <button class="icon-btn" onclick="location.href='index.html'">→</button>

<section class="hero">
  <img src="assets/img/station7-workshop.webp" alt="ورشة الكلمات" loading="lazy" decoding="async">

  <div class="caption"><h2>وَرْشَةُ الكَلِمَات</h2><p>آلَةُ المُخْتَرِعَةِ لُولُو تَصْنَعُ الأَشْيَاءَ مِنَ الكَلِمَات! رَكِّبِ الحُرُوفَ بِالتَّرْتِيبِ لِتَعْمَلَ الآلَة.</p></div>
